name: my_first_workflow_actions
# to get a trigger push every minute
on: 
  push:

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: step 1
        run: |
          pwd
          ls -ltr
          hostname
      - name:  step 2
        uses: actions/checkout@v7.0.0
      - name: step 3
        run: |
          echo 'pwd' >> myartifact.txt  # file created and pwd written in there
          mkdir artifacts
          echo 'ls -tlr' >> artifacts/list.txt
          echo 'hostname' >> artifacts/hostname.txt
      - name: upload single file
        uses: actions/upload-artifact@v7  # actions got from github marketplace
        with:
          name: single_file
          path: ./myartifact.txt
      - name: upload form directory
        uses: actions/upload-artifact@v7
        with:
          name: directory_artifacts
          path: artifacts/
      - name: upload from multiple paths with exclusion
        uses: actions/upload-artifact@v7
        with:
          name: multiple_path_with_exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt  # this file i dont want to upload
      - name: upload from multiple paths
        uses: actions/upload-artifact@v7
        with:
          name: multiple_path
          path: |
            ./myartifact.txt
            artifacts/
            
      
          
        
      

    

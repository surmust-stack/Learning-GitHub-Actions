name: my_first_workflow_actions
# to get a trigger push every minute
on: 
  push: # these push only work following brachnes
    branches: 
       - main
  pull_request:   # so only trigger when request from main bracher
    branches:   
      - main

jobs:
  #adding unit test to the workflow
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name:  check out code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-tests_result.xml --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload code coverage result
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: reports/
  #adding codeql scanning to the workflow
  codeql:
    name: CodeQL security scanning
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write  # required to upload anlysis results
    strategy:
      fail-fast: false
      matrix:
        language: ['python']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3    
        with:
          category: 'security'
# adding sonarqube scanning to the workflow 
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: sonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      

    

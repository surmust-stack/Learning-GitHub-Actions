name: my_first_workflow_actions
# to get a trigger push every minute
on: 
  push: # these push only work following brachnes
    branches: 
       - main
  pull_request:   # so only trigger when request from main bracher
    branches:   
      - main

jobs:
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name:  check out code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: pytest -v
      

    

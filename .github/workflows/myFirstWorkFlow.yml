name: my_first_workflow
# to get a trigger on every push in the rep in any branch
on: push
# define jobs in workflow
jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Running single command in job1
        run: echo "Hi this is my first Github workflow using YAML"

      - name: checking os release for github hosted runner
        run: cat /etc/os-release

      - name: checking whoami command
        run: whoami
      - name: calling sleep
        run: sleep 10
  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
      - name: checking the hostname for unner
        run: hostname
      - name: running multiple commands
        run: |
          echo "hi form yousuf"
          echo "current time is 'date'"
          sleep 10
  job3:
    name: JOBS3
    needs: job1
    runs-on: windows-latest
    steps:
      - name: job with single dependency
        run: sleep 10
      - name: checking runner info
        shell: pwsh
        run: get-computerinfo

  job4:
    name: JOBS4
    needs: [job1, job2, job3]
    runs-on: macos-latest
    steps:
      - name: job of multiple dependencies
        run: sleep 15
      - name: checking runner info
        run: sw_vers
    

name: my_first_workflow_actions
# to get a trigger push every minute
on: 
  push: # these push only work following brachnes
    branches: 
       - main
  pull_request:   # so only trigger when request from main bracher
    branches:   
      - main

jobs:
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name:  check out code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-tests_result.xml --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload code coverage result
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: reports/
          
      

    
